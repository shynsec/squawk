<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>
  <!-- Waveform bars centered -->
  <rect x="5"  y="13" width="3" height="6"  rx="1.5" fill="white" opacity="0.9"/>
  <rect x="10" y="9"  width="3" height="14" rx="1.5" fill="white" opacity="0.9"/>
  <rect x="15" y="5"  width="3" height="22" rx="1.5" fill="white" opacity="0.9"/>
  <rect x="20" y="9"  width="3" height="14" rx="1.5" fill="white" opacity="0.9"/>
  <rect x="25" y="13" width="3" height="6"  rx="1.5" fill="white" opacity="0.9"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f7dff"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
</svg>
